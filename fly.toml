# fly.toml app configuration file for vxpaybridge
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vxpaybridge'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'dotnet VxPayBridge.API.dll --migrate'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
